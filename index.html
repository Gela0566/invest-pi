<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <!-- Chargement du SDK Pi Network -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding-top: 50px;">
    <h1 style="color: #6200ee;">Invest Pi 🚀</h1>
    <p>L'application est officiellement en ligne et prête.</p>

    <button id="pay-btn" style="padding: 15px 30px; background-color: #6200ee; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
        Faire un paiement Testnet
    </button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-btn').addEventListener('click', async () => {
            try {
                const scopes = ['username', 'payments'];
                
                // Cette fonction intercepte et résout automatiquement les paiements bloqués
                function onIncompletePaymentFound(payment) {
                    alert("Ancien paiement suspendu détecté. Tentative de déblocage automatique...");
                    if (payment.transaction && payment.transaction.txid) {
                        fetch('https://invest-pi-gamma.vercel.app/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                        })
                        .then(res => res.json())
                        .then(data => {
                            alert("Ancien paiement validé et débloqué avec succès ! Vous pouvez maintenant rejouer.");
                            window.location.reload();
                        })
                        .catch(err => alert("Erreur lors du déblocage : " + err.message));
                    }
                }

                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                alert("Connecté : " + auth.user.username);

                const paymentData = {
                    amount: 1.0,
                    memo: "Test de paiement d'application Invest Pi",
                    metadata: { app: "invest-pi" }
                };

                const callbacks = {
                    onReadyForServerApproval: (paymentId) => {
                        fetch('https://invest-pi-gamma.vercel.app/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert("Paiement approuvé par le serveur !");
                            } else {
                                alert("Erreur d'approbation : " + JSON.stringify(data.error));
                            }
                        })
                        .catch(error => {
                            alert("Erreur réseau backend : " + error.message);
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        // Appel de notre nouvelle API pour finaliser proprement le paiement
                        fetch('https://invest-pi-gamma.vercel.app/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId, txid: txid })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert("Transaction réussie et totalement finalisée !");
                            } else {
                                alert("Erreur lors de la complétion : " + JSON.stringify(data.error));
                            }
                        })
                        .catch(error => {
                            alert("Erreur réseau complétion : " + error.message);
                        });
                    },
                    onCancel: (paymentId) => {
                        alert("Paiement annulé.");
                    },
                    onError: (error, payment) => {
                        alert("Erreur : " + error.message);
                    }
                };

                await Pi.createPayment(paymentData, callbacks);

            } catch (error) {
                alert("Erreur : " + error.message);
            }
        });
    </script>
</body>
</html>
