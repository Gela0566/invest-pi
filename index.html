<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            color: #5a10e7;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 25px;
        }

        button {
            background-color: #5a10e7;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #450bc4;
        }
    </style>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div class="container">
        <h1>Invest Pi 🚀</h1>
        <p>Système de paiement optimisé.</p>
        <button onclick="startPaymentFlow()">Faire un paiement Testnet</button>
    </div>

    <script>
        window.onload = function() {
            if (typeof Pi !== 'undefined') {
                try {
                    Pi.init({ version: "2.0", sandbox: true });
                } catch (e) {
                    console.error("Erreur init Pi:", e);
                }
            }
        };

        function startPaymentFlow() {
            if (typeof Pi === 'undefined') {
                alert("Le SDK Pi n'est pas chargé.");
                return;
            }

            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
                .then(function(auth) {
                    launchPiPayment();
                })
                .catch(function(error) {
                    alert("Erreur d'authentification : " + error.message);
                });
        }

        function onIncompletePaymentFound(payment) {
            console.log("Paiement incomplet trouvé :", payment);
        }

        function launchPiPayment() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Test de paiement d'application Invest Pi",
                metadata: { app: "invest-pi" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("paymentId généré avec succès :", paymentId);
                    
                    // ON INDIQUE À PI NETWORK QUE L'APPLICATION TRAITE LE PAIEMENT
                    // Cela évite l'expiration automatique immédiate pendant le test d'interface
                    alert("ID de transaction généré : " + paymentId + "\n\nRedirection vers le Wallet Pi de Test...");
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Paiement exécuté. TxID:", txid);
                    alert("Paiement complété !");
                },
                onCancel: function(paymentId) {
                    console.log("Paiement annulé.");
                },
                onError: function(error, payment) {
                    alert("Statut du protocole : " + error.message);
                }
            });
        }
    </script>
</body>
</html>
