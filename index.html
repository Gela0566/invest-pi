<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            color: #5a10e7;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 25px;
        }

        button {
            background-color: #5a10e7;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #450bc4;
        }
    </style>
    <!-- Chargement du SDK Pi officiel -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div class="container">
        <h1>Invest Pi 🚀</h1>
        <p>Système de paiement optimisé.</p>
        <button onclick="launchPiPayment()">Faire un paiement Testnet</button>
    </div>

    <script>
        const BACKEND_URL = "https://invest-pi.vercel.app/api/pay";

        // Initialisation automatique du SDK dès le chargement
        window.onload = function() {
            if (typeof Pi !== 'undefined') {
                Pi.init({ version: "2.0", sandbox: true });
                // Authentification silencieuse pour l'accès aux paiements
                Pi.authenticate(['username', 'payments'], function(payment) {
                    console.log("Paiement incomplet trouvé :", payment);
                }).catch(function(err) {
                    console.error("Erreur d'authentification initiale:", err);
                });
            }
        };

        function launchPiPayment() {
            if (typeof Pi === 'undefined') {
                alert("Le SDK Pi n'est pas prêt.");
                return;
            }

            try {
                Pi.createPayment({
                    amount: 1.0,
                    memo: "Test de paiement d'application Invest Pi",
                    metadata: { app: "invest-pi" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        fetch(BACKEND_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'approve', paymentId: paymentId })
                        })
                        .then(res => res.json())
                        .then(data => console.log("Approuvé par le serveur"))
                        .catch(err => console.error("Erreur approbation:", err));
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        fetch(BACKEND_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'complete', paymentId: paymentId, txid: txid })
                        })
                        .then(res => res.json())
                        .then(data => {
                            alert("Paiement réussi !");
                        })
                        .catch(err => console.error("Erreur finalisation:", err));
                    },
                    onCancel: function(paymentId) {
                        console.log("Paiement annulé.");
                    },
                    onError: function(error, payment) {
                        alert("Erreur de paiement : " + error.message);
                    }
                });
            } catch (err) {
                alert("Erreur système : " + err.message);
            }
        }
    </script>
</body>
</html>
