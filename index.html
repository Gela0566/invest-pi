<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        h1 { color: #5a10e7; font-size: 32px; }
        button { background: #5a10e7; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; }
    </style>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <div>
        <h1>Invest Pi 🚀</h1>
        <p>Système de paiement optimisé.</p>
        <button onclick="startPayment()">Faire un paiement Testnet</button>
    </div>

    <script>
        // On cible directement la racine de ton projet Vercel
        const SERVER_URL = "https://invest-pi-gamma.vercel.app/";

        window.onload = function() {
            if (typeof Pi !== 'undefined') { Pi.init({ version: "2.0", sandbox: true }); }
        };

        function startPayment() {
            Pi.authenticate(['username', 'payments'], function() {})
                .then(function() {
                    Pi.createPayment({
                        amount: 1.0,
                        memo: "Test Invest Pi",
                        metadata: { app: "invest-pi" }
                    }, {
                        onReadyForServerApproval: function(paymentId) {
                            // On envoie l'ID directement à ton serveur racine
                            fetch(SERVER_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'approve', paymentId: paymentId })
                            })
                            .then(res => res.json())
                            .then(data => console.log("Serveur OK, le Wallet va s'ouvrir !"))
                            .catch(err => alert("Erreur serveur : " + err.message));
                        },
                        onReadyForServerCompletion: function(paymentId, txid) {
                            fetch(SERVER_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'complete', paymentId: paymentId, txid: txid })
                            }).then(() => alert("Paiement réussi !"));
                        },
                        onCancel: function() {},
                        onError: function(err) { alert("Erreur Pi : " + err.message); }
                    });
                });
        }
    </script>
</body>
</html>
