<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi | Écosystème</title>
    <style>
        :root {
            --pi-purple: #622181;
            --pi-gold: #fca311;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --success-green: #2ec4b6;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo-container {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .badge-testnet {
            background-color: var(--pi-gold);
            color: #000;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-card p {
            margin: 5px 0 0 0;
            font-size: 18px;
            font-weight: bold;
            color: var(--pi-gold);
        }

        .main-content {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .offer-card {
            background: linear-gradient(145deg, #1e1e1e, #25182e);
            border: 1px solid #3d1c52;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .offer-card h2 {
            margin-top: 0;
            font-size: 20px;
        }

        .offer-card p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .btn-payment {
            background-color: var(--pi-purple);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(98, 33, 129, 0.3);
            transition: opacity 0.2s;
        }

        .btn-payment:active {
            opacity: 0.8;
        }

        .history-card {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 15px;
            text-align: left;
        }

        .history-card h3 {
            margin-top: 0;
            <script>
        let currentBalance = 100.0000;
        let isPiReady = false;

        window.onload = function() {
            // Animation du rendement simulé
            setInterval(() => {
                currentBalance += 0.0001;
                if(document.getElementById('live-balance')) {
                    document.getElementById('live-balance').innerText = currentBalance.toFixed(4) + " Pi";
                }
            }, 1000); 
            
            // On lance l'initialisation proprement après le chargement de la page
            initPiSDK();
        };

        function initPiSDK() {
            if (typeof Pi !== 'undefined') {
                try {
                    // 1. On initialise d'abord le SDK
                    Pi.init({ version: "2.0", sandbox: false });
                    console.log("SDK Pi initialisé avec succès.");
                    
                    // 2. SEULEMENT APRÈS, on active le drapeau et on lance l'authentification
                    isPiReady = true;
                    authUser();
                } catch (err) {
                    document.getElementById('username-display').innerText = "Erreur d'initialisation : " + err.message;
                    document.getElementById('username-display').style.color = "#ff4d4d";
                }
            } else {
                // Si le script Pi charge un peu lentement, on réessaye dans 200ms
                setTimeout(initPiSDK, 200);
            }
        }

        async function authUser() {
            // On s'assure une deuxième fois qu'on ne lance pas auth sans init
            if (!isPiReady) return; 

            try {
                const scopes = ['username', 'payments']; 
                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                if (authResult && authResult.user) {
                    document.getElementById('username-display').innerText = "Fonds Gelase connecté : @" + authResult.user.username;
                    document.getElementById('username-display').style.color = "#2ec4b6"; 
                }
            } catch (error) {
                document.getElementById('username-display').innerText = "Erreur d'authentification : " + error.message;
                document.getElementById('username-display').style.color = "#ff4d4d"; 
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Paiement incomplet trouvé :", payment);
        }

        function addTransactionToHistory(amount, memo) {
            const historyList = document.getElementById('tx-history');
            const noTxElement = document.getElementById('no-tx');
            if (noTxElement) noTxElement.remove();

            const li = document.createElement('li');
            li.className = 'transaction-item';
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            li.innerHTML = `
                <div>
                    <strong>${memo}</strong><br>
                    <span style="color: var(--text-muted); font-size: 11px;">Aujourd'hui à ${timeStr}</span>
                </div>
                <div style="text-align: right;">
                    <span style="color: var(--pi-gold); font-weight: bold;">-${amount} Pi</span><br>
                    <span style="color: var(--success-green); font-weight: bold;">Réussi</span>
                </div>
            `;
            historyList.insertBefore(li, historyList.firstChild);
        }

        function launchPiPayment() {
            if (!isPiReady || typeof Pi === 'undefined') {
                alert("Le SDK Pi n'est pas encore prêt ou initialisé.");
                return;
            }

            try {
                Pi.createPayment({
                    amount: 1.0,
                    memo: "Dépôt Pool Gelase",
                    metadata: { fund: "Gelase Invest Testnet" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Paiement initié, ID :", paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        addTransactionToHistory(1.0, "Dépôt Pool Gelase");
                        currentBalance -= 1.0;
                    },
                    onCancel: function(paymentId) {
                        console.log("Paiement annulé.");
                    },
                    onError: function(error, payment) {
                        alert("Erreur réseau : " + error.message);
                    }
                });
            } catch (err) {
                alert("Erreur système : " + err.message);
            }
        }
    </script>
        </div>
        <div class="stat-card">
            <h3>Rendement (ROI)</h3>
            <p>+ 12.5 %</p>
        </div>
    </section>

    <main class="main-content">
        <div class="offer-card">
            <h2>Pool d'Investissement Gelase</h2>
            <p>Participez à la simulation de notre fonds de liquidité décentralisé. Validez la transaction ci-dessous pour tester le paiement.</p>
            
            <button class="btn-payment" onclick="launchPiPayment()">
                Faire un paiement Testnet (1 Pi)
            </button>
        </div>

        <div class="history-card">
            <h3>Historique des Dépôts</h3>
            <ul class="transaction-list" id="tx-history">
                <li class="transaction-item" id="no-tx">
                    <span style="color: var(--text-muted);">Aucune transaction détectée sur cette session.</span>
                </li>
            </ul>
        </div>
    </main>

    <footer>
        &copy; 2026 Gelase. Tous droits réservés.<br>
        Application certifiée pour l'écosystème Pi Network.
    </footer>

    <script>
        let currentBalance = 100.0000;
        let isPiReady = false;

        window.onload = function() {
            // Animation du rendement
            setInterval(() => {
                currentBalance += 0.0001;
                if(document.getElementById('live-balance')) {
                    document.getElementById('live-balance').innerText = currentBalance.toFixed(4) + " Pi";
                }
            }, 1000); 
            
            setTimeout(initPiSDK, 500);
        };

        function initPiSDK() {
            if (typeof Pi !== 'undefined') {
                try {
                    // sandbox: false car ton URL de developpement pointe sur Vercel directement dans ton portail
                    Pi.init({ version: "2.0", sandbox: false });
                    isPiReady = true;
                    authUser();
                } catch (err) {
                    document.getElementById('username-display').innerText = "Erreur d'initialisation SDK";
                }
            } else {
                setTimeout(initPiSDK, 500);
            }
        }

        // JavaScript de reconnexion robuste et diagnostic
        async function authUser() {
            try {
                const scopes = ['username', 'payments']; 
                const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                if (authResult && authResult.user) {
                    document.getElementById('username-display').innerText = "Fonds Gelase connecté : @" + authResult.user.username;
                    document.getElementById('username-display').style.color = "#2ec4b6"; 
                }
            } catch (error) {
                // S'il y a un rejet, on affiche exactement la cause ici en rouge
                document.getElementById('username-display').innerText = "Erreur de liaison : " + error.message;
                document.getElementById('username-display').style.color = "#ff4d4d"; 
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Paiement incomplet trouvé :", payment);
        }

        function addTransactionToHistory(amount, memo) {
            const historyList = document.getElementById('tx-history');
            const noTxElement = document.getElementById('no-tx');
            if (noTxElement) noTxElement.remove();

            const li = document.createElement('li');
            li.className = 'transaction-item';
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            li.innerHTML = `
                <div>
                    <strong>${memo}</strong><br>
                    <span style="color: var(--text-muted); font-size: 11px;">Aujourd'hui à ${timeStr}</span>
                </div>
                <div style="text-align: right;">
                    <span style="color: var(--pi-gold); font-weight: bold;">-${amount} Pi</span><br>
                    <span style="color: var(--success-green); font-weight: bold;">Réussi</span>
                </div>
            `;
            historyList.insertBefore(li, historyList.firstChild);
        }

        function launchPiPayment() {
            if (!isPiReady || typeof Pi === 'undefined') {
                alert("Le SDK Pi n'est pas prêt.");
                return;
            }

            try {
                Pi.createPayment({
                    amount: 1.0,
                    memo: "Dépôt Pool Gelase",
                    metadata: { fund: "Gelase Invest Testnet" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Paiement initié, ID :", paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        addTransactionToHistory(1.0, "Dépôt Pool Gelase");
                        currentBalance -= 1.0;
                    },
                    onCancel: function(paymentId) {
                        console.log("Paiement annulé.");
                    },
                    onError: function(error, payment) {
                        alert("Erreur réseau : " + error.message);
                    }
                });
            } catch (err) {
                alert("Erreur système : " + err.message);
            }
        }
    </script>
</body>
</html>
