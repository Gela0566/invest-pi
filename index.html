<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <!-- Chargement du SDK Pi Network -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px 20px;">
    <h1 style="color: #6200ee;">Invest Pi 🚀</h1>
    <p>L'application est officiellement en ligne et prête pour le Testnet.</p>
    
    <button id="pay-btn" style="padding: 15px 30px; background-color: #6200ee; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer;">
        Faire un paiement Testnet
    </button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-btn').addEventListener('click', async () => {
            try {
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) {
                    console.log("Paiement incomplet :", payment);
                }
                
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                alert("Connecté : " + auth.user.username);

                const paymentData = {
                    amount: 1.0,
                    memo: "Test de paiement d'application Invest Pi",
                    metadata: { app: "invest-pi" }
                };

                const callbacks = {
                    onReadyForServerApproval: (paymentId) => {
                        alert("Paiement généré ! ID : " + paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Transaction réussie ! TXID : " + txid);
                    },
                    onCancel: (paymentId) => {
                        alert("Paiement annulé.");
                    },
                    onError: (error, payment) => {
                        alert("Erreur : " + error.message);
                    }
                };

                await Pi.createPayment(paymentData, callbacks);

            } catch (error) {
                alert("Erreur SDK Pi : " + error.message);
            }
        });
    </script>
</body>
</html>
