<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            color: #5a10e7;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 25px;
        }

        button {
            background-color: #5a10e7;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #450bc4;
        }
    </style>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div class="container">
        <h1>Invest Pi 🚀</h1>
        <p>Système de paiement optimisé.</p>
        <button onclick="startPaymentFlow()">Faire un paiement Testnet</button>
    </div>

    <script>
        const BACKEND_URL = "https://invest-pi-gamma.vercel.app/api/pay";

        window.onload = function() {
            if (typeof Pi !== 'undefined') {
                try {
                    Pi.init({ version: "2.0", sandbox: true });
                } catch (e) {
                    console.error("Erreur init Pi:", e);
                }
            }
        };

        // Syntaxe simplifiée et propre sans async/await pour éviter le blocage du bouton
        function startPaymentFlow() {
            if (typeof Pi === 'undefined') {
                alert("Le SDK Pi n'est pas chargé.");
                return;
            }

            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
                .then(function(auth) {
                    console.log("Authentifié avec succès :", auth.user.username);
                    // On enchaîne directement sur la création du paiement
                    launchPiPayment();
                })
                .catch(function(error) {
                    alert("Erreur d'authentification : " + error.message);
                });
        }

        function onIncompletePaymentFound(payment) {
            console.log("Paiement incomplet trouvé :", payment);
        }

        function launchPiPayment() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Test de paiement d'application Invest Pi",
                metadata: { app: "invest-pi" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("paymentId généré, envoi à Vercel :", paymentId);
                    
                    fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'approve', paymentId: paymentId })
                    })
                    .then(function(res) {
                        if (!res.ok) {
                            throw new Error("Erreur HTTP " + res.status);
                        }
                        return res.json();
                    })
                    .then(function(data) {
                        console.log("Approuvé par le serveur :", data);
                    })
                    .catch(function(err) {
                        alert("⚠️ Erreur Approbation Serveur : " + err.message + "\n\nTon backend n'a pas répondu à temps à Pi Network (Délai de 60s).");
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'complete', paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        alert("Paiement réussi !");
                    })
                    .catch(err => console.error("Erreur complétion:", err));
                },
                onCancel: function(paymentId) {
                    console.log("Paiement annulé.");
                },
                onError: function(error, payment) {
                    alert("Erreur Pi : " + error.message);
                }
            });
        }
    </script>
</body>
</html>
