<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invest Pi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            color: #5a10e7;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #333333;
            margin-bottom: 25px;
        }

        button {
            background-color: #5a10e7;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #450bc4;
        }
    </style>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <div class="container">
        <h1>Invest Pi 🚀</h1>
        <p>Système de paiement optimisé.</p>
        <button onclick="startPaymentFlow()">Faire un paiement Testnet</button>
    </div>

    <script>
        // Ton URL de production validée
        const BACKEND_URL = "https://invest-pi-gamma.vercel.app/api/pay";

        window.onload = function() {
            if (typeof Pi !== 'undefined') {
                try {
                    Pi.init({ version: "2.0", sandbox: true });
                } catch (e) {
                    console.error("Erreur initialisation Pi:", e);
                }
            }
        };

        // Cette fonction gère l'authentification obligatoire requise par Pi avant le paiement
        function startPaymentFlow() {
            if (typeof Pi === 'undefined') {
                alert("Le SDK Pi n'est pas prêt.");
                return;
            }

            // Demande explicite des scopes requis au protocole Pi
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
                .then(function(auth) {
                    // Si l'authentification réussit, les droits 'payments' sont actifs : on lance la transaction
                    launchPiPayment();
                })
                .catch(function(error) {
                    alert("Erreur d'authentification : " + error.message);
                });
        }

        function onIncompletePaymentFound(payment) {
            console.log("Paiement incomplet trouvé :", payment);
        }

        // Déclenchement de la fenêtre de paiement (Passphrase Pi Wallet)
        function launchPiPayment() {
            Pi.createPayment({
                amount: 1.0,
                memo: "Test de paiement d'application Invest Pi",
                metadata: { app: "invest-pi" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'approve', paymentId: paymentId })
                    })
                    .then(res => res.json())
                    .then(data => console.log("Paiement approuvé par ton serveur."))
                    .catch(err => console.error("Erreur lors de l'approbation:", err));
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'complete', paymentId: paymentId, txid: txid })
                    })
                    .then(res => res.json())
                    .then(data => {
                        alert("Paiement complété avec succès sur la Blockchain !");
                    })
                    .catch(err => console.error("Erreur lors de la finalisation:", err));
                },
                onCancel: function(paymentId) {
                    console.log("Paiement annulé par l'utilisateur.");
                },
                onError: function(error, payment) {
                    alert("Erreur de la passerelle Pi : " + error.message);
                }
            });
        }
    </script>
</body>
</html>
