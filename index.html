<script>
    // 1. Initialisation du SDK Pi
    Pi.init({ version: "2.0", sandbox: true }); 

    // Variables pour le compteur de solde vivant
    let currentBalance = 100.0000;
    const roiPercentage = 12.5; // Le taux affiché sur votre carte

    // Fonction qui fait grimper le solde en direct (Simule un rendement constant)
    function startLiveYield() {
        const balanceElement = document.getElementById('live-balance');
        if (balanceElement) {
            setInterval(() => {
                // Augmente le solde de 0.0001 Pi toutes les secondes
                currentBalance += 0.0001;
                // Met à jour l'affichage sur l'écran avec 4 décimales
                balanceElement.innerText = currentBalance.toFixed(4) + " Pi";
            }, 1000); // 1000 millisecondes = 1 seconde
        }
    }

    // 2. Authentification automatique à l'ouverture
    async function authUser() {
        try {
            const scopes = ['username'];
            const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            if (authResult && authResult.user) {
                document.getElementById('username-display').innerText = "Bienvenue " + authResult.user.username;
            }
        } catch (error) {
            console.error("Erreur d'authentification :", error);
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Paiement incomplet trouvé :", payment);
    }

    // Lance les fonctions dès que la DApp s'affiche dans le Pi Browser
    window.onload = function() {
        authUser();
        startLiveYield(); // Déclenche le solde en temps réel
    };

    // 3. ACTION DU BOUTON (Réactivé)
    function launchPiPayment() {
        console.log("Lancement du paiement...");
        
        Pi.createPayment({
            amount: 1.0,
            memo: "Test de paiement d'application Invest Pi",
            metadata: { investor: "Alpha Pool" },
        }, {
            onReadyForServerApproval: function(paymentId) {
                console.log("Payment ID prêt pour approbation :", paymentId);
                // Étape 2 (Backend) : C'est ici que votre futur serveur validera la transaction
            },
            onReadyForServerCompletion: function(paymentId, txid) {
                console.log("Paiement complété sur la blockchain ! TXID :", txid);
            },
            onCancel: function(paymentId) {
                console.log("Paiement annulé par l'utilisateur.");
            },
            onError: function(error, payment) {
                console.error("Une erreur est survenue :", error);
            }
        });
    }
</script>
